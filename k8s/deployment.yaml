apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-dashboard
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-dashboard
  template:
    metadata:
      labels:
        app: alertmanager-dashboard
    spec:
      serviceAccountName: alertmanager-dashboard
      containers:
        - name: dashboard
          image: your-registry/alertmanager-dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_CONFIGMAP_NAME
              value: "alertmanager-dashboard"
            - name: NODE_ENV
              value: "production"
            # Set to "true" to enforce LDAP login (requires LDAP config in Settings)
            - name: LDAP_ENABLED
              value: "false"
            # Generate with: openssl rand -base64 32
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: alertmanager-dashboard-auth
                  key: secret
            - name: NEXTAUTH_URL
              value: "https://your-dashboard-url"
            # Optional: static API key for programmatic access (bypasses LDAP)
            # Generate with: openssl rand -hex 32
            # - name: API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: alertmanager-dashboard-auth
            #       key: api-key
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-dashboard
  namespace: monitoring
spec:
  selector:
    app: alertmanager-dashboard
  ports:
    - port: 80
      targetPort: 3000
