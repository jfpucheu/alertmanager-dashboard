apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager-dashboard
  namespace: monitoring   # adapte le namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alertmanager-dashboard
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["alertmanager-dashboard"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]   # pour la création initiale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alertmanager-dashboard
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: alertmanager-dashboard
    namespace: monitoring
roleRef:
  kind: Role
  name: alertmanager-dashboard
  apiGroup: rbac.authorization.k8s.io
